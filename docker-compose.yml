services:
  # BD
  db-data:
    image: alpine
    volumes:
      - ./data:/data
    command: chown -R 1000:1000 /data

  # Mensageria - Zookeeper (Necessário para o Kafka)
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # Mensageria - Kafka
  # Utilizado para o fluxo de Tarifas e Transferências
  kafka:
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # API de Conta Corrente
  account-api:
    build:
      context: .
      dockerfile: src/Services/Account/Account.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/bankmore.db
      - Kafka__BootstrapServers=kafka:29092
    volumes:
      - ./data:/data
    ports:
      - "5001:8080"
    depends_on:
      - kafka
    deploy:
      [cite_start]replicas: 2 [cite: 19]

  # API de Transferência
  transfer-api:
    build:
      context: .
      dockerfile: src/Services/Transfer/Transfer.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/data/bankmore.db
      - Kafka__BootstrapServers=kafka:29092
      - AccountApi__Url=http://account-api:8080
    volumes:
      - ./data:/data
    ports:
      - "5002:8080"
    depends_on:
      - kafka
      - account-api

  # Aplicação de Tarifas
  fees-app:
    build:
      context: .
      dockerfile: src/Services/Fees/Fees.Worker/Dockerfile
    environment:
      - Kafka__BootstrapServers=kafka:29092
      - [cite_start]FeeAmount=2.00 [cite: 164]
    depends_on:
      - kafka